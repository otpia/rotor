# Rotor release pipeline: produces one DMG for Apple Silicon and one for Intel.
#
# Triggers:
#   - Push a tag matching v*.*.* — runs build + publishes a GitHub Release
#   - workflow_dispatch — manual run, only uploads artifacts (no Release)
#
# Notes:
#   - Project MACOSX_DEPLOYMENT_TARGET = 26.3 requires Xcode 26+ SDK; depends on
#     when GitHub publishes that runner image. If the runner Xcode SDK is < 26
#     the build will fail; switch `xcode-version` to `latest` or temporarily lower
#     the project deployment target to 15.0 in that case.
#   - Codesigning is ad-hoc (no CI cert). The DMG is distributable, but Gatekeeper
#     blocks the first launch — users must right-click "Open" once. Notarization
#     requires Apple Developer credentials in repo secrets (APPLE_ID, TEAM_ID,
#     Developer ID cert) plus a notarytool step (can be added later).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (optional, defaults to commit short SHA)'
        required: false
        type: string

env:
  XCODE_PROJECT: rotor.xcodeproj
  XCODE_SCHEME: rotor

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            suffix: "-arm64"
            label: apple-silicon
          - arch: x86_64
            suffix: "-x86_64"
            label: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ matrix.arch }}-spm-${{ hashFiles('**/Package.resolved', 'rotor.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-spm-

      - name: Resolve SPM packages
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies

      - name: Build ${{ matrix.arch }}
        run: |
          set -euxo pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            VALID_ARCHS="${{ matrix.arch }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version_override }}" ]]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create DMG (styled)
        run: |
          set -euxo pipefail
          DMG_NAME="Rotor${{ matrix.suffix }}.dmg"
          # create-dmg lays out the Finder window: app icon on the left, /Applications symlink on the right
          create-dmg \
            --volname "Rotor" \
            --window-pos 240 160 \
            --window-size 540 360 \
            --icon-size 110 \
            --icon "Rotor.app" 140 175 \
            --hide-extension "Rotor.app" \
            --app-drop-link 400 175 \
            --no-internet-enable \
            --hdiutil-quiet \
            "$DMG_NAME" \
            build/Build/Products/Release/Rotor.app
          ls -lh "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rotor-${{ steps.version.outputs.version }}-${{ matrix.label }}
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all DMGs
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist

      - name: Build changelog
        id: cl
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Pick the previous semver tag (skip the current one); fall back to the
          # first commit so initial releases still get a complete log
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v -x "$TAG" | head -n 1 || true)
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD)
            COMPARE_LINK="https://github.com/$REPO/commits/$TAG"
          else
            COMPARE_LINK="https://github.com/$REPO/compare/$PREV...$TAG"
          fi

          {
            echo "## Summary"
            echo
            # Group by Conventional Commits prefix; output bullets verbatim so users
            # see the same prefixes the project uses internally
            git log --no-merges --pretty=format:'%s' "$PREV..$TAG" \
              | grep -E '^(feat|fix|perf|refactor|docs|build|ci|chore|style|test|revert)(\([^)]*\))?:' \
              | sed 's/^/- /' \
              || echo "- (no notable changes)"
            echo
            echo
            echo "**Full Changelog**: $COMPARE_LINK"
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
